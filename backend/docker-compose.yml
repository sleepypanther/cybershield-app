services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/cybershield
      CLIENT_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET: docker-jwt-secret-change-me
      JWT_EXPIRES_IN: 7d
      NMAP_DEFAULT_TARGET: host.docker.internal
      NMAP_DEFAULT_PORTS: 1-1024
      BREACH_API_URL: ""
      BREACH_API_KEY: ""
      BREACH_API_TIMEOUT_MS: 5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"

volumes:
  mongo-data:
